<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Insumos - Gestión de Despachos</title>
  <!-- Font Awesome 6 (iconos) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <!-- SIDEBAR (navegación principal) -->
    <aside class="sidebar">
      <div class="logo-area">
        <h2><i class="fas fa-boxes"></i> Insumos</h2>
        <p class="subtitle">Gestión de Despachos</p>
      </div>
      <nav class="nav-menu">
        <ul>
          <li class="nav-item active" data-section="dashboard">
            <i class="fas fa-tachometer-alt"></i> <span>Dashboard</span>
          </li>
          <li class="nav-item" data-section="solicitudes">
            <i class="fas fa-clipboard-list"></i> <span>Solicitudes</span>
          </li>
          <li class="nav-item" data-section="inventario">
            <i class="fas fa-boxes"></i> <span>Inventario</span>
          </li>
          <li class="nav-item" data-section="despacho">
            <i class="fas fa-truck"></i> <span>Despacho</span>
          </li>
          <li class="nav-item" data-section="usuarios">
            <i class="fas fa-users"></i> <span>Usuarios</span>
          </li>
        </ul>
      </nav>
      <div class="user-info-sidebar">
        <i class="fas fa-user-circle"></i>
        <div>
          <span id="userNameSidebar">Camila Hernández</span>
          <small id="userRoleSidebar">Administrador</small>
        </div>
      </div>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
      <header class="top-bar">
        <div class="page-title">
          <h1 id="currentSectionTitle">Dashboard</h1>
        </div>
        <div class="header-actions">
          <button id="logoutBtn" class="btn-icon" title="Cerrar sesión"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </header>

      <div class="content-container" id="contentContainer">
        <!-- Aquí se cargará dinámicamente cada sección mediante JS -->
        <div class="loader-wrapper" id="loaderWrapper">
          <div class="loader"></div>
        </div>
        <div id="dynamicContent"></div>
      </div>
    </main>
  </div>

  <!-- Modales globales (ejemplo para confirmar despacho) -->
  <div id="modalConfirm" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h3 id="modalTitle">Confirmar acción</h3>
      <p id="modalMessage">¿Estás seguro de realizar esta operación?</p>
      <div class="modal-buttons">
        <button id="modalConfirmBtn" class="btn-primary">Confirmar</button>
        <button id="modalCancelBtn" class="btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
</body>
</html>
